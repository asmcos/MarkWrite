<div class="compose-book-root" data-compose-template="book">
  <div data-compose-slot="top">
    <div id="content-compose-info-block" class="content-compose-info-block book-compose-info-block">
      <div class="content-compose-grid content-compose-grid--top">
        <div class="content-compose-field">
          <label for="content-compose-main-title">标题</label>
          <input id="content-compose-main-title" type="text" placeholder="请输入标题" maxlength="120" />
        </div>
        <div class="content-compose-field content-compose-cover-field">
          <label>封面（正方形）</label>
          <div class="content-compose-cover-row">
            <div class="content-compose-cover-preview" id="content-compose-cover-preview" title="点击上传或截图粘贴封面">
              <i class="bi bi-image"></i>
            </div>
            <div class="content-compose-cover-side">
              <div class="content-compose-cover-actions">
                <button type="button" class="content-compose-mini-btn" id="content-compose-cover-upload">上传图片</button>
                <button type="button" class="content-compose-mini-btn" id="content-compose-cover-screenshot">截图粘贴</button>
              </div>
              <p class="content-compose-cover-hint">仅支持上传或剪贴板截图，预览为居中裁剪的正方形。</p>
              <input id="content-compose-cover-file" type="file" accept="image/png,image/jpeg,image/webp,image/gif" style="display:none;" />
              <input type="hidden" id="content-compose-cover" value="" />
            </div>
          </div>
        </div>
      </div>
      <div class="content-compose-book-shell" id="content-compose-book-shell" style="display:none;" aria-hidden="true">
        <div class="content-compose-book-banner">
          <div class="content-compose-book-banner-glow" aria-hidden="true"></div>
          <span class="content-compose-book-banner-icon" aria-hidden="true"><i class="bi bi-book-half"></i></span>
          <div class="content-compose-book-banner-text">
            <div class="content-compose-book-banner-title">创建书籍</div>
            <p class="content-compose-book-banner-desc" id="content-compose-book-banner-desc">
              在左侧切换「编辑正文」可编辑大纲与全书正文；本页填写封面、作者与标签。
            </p>
          </div>
        </div>
      </div>
    </div>
    <div id="book-compose-upload-block" class="book-compose-upload-block" style="display: none" aria-hidden="true">
      <p class="book-upload-intro">
        <strong>待上传</strong>按<strong>内容</strong>与上次成功上传时保存的摘要比对（书籍信息字段、大纲文件、各章
        <code>.md</code> 的 SHA-256），不单看修改时间：只改过 B 章并上传后，A 章仍显示已同步。无摘要的旧数据会暂时仍用时间比对，成功上传一次后即写入摘要。可<strong>勾选分项</strong>后「上传选中项」或「全部上传」，或各行「上传」。默认只同步有变更项；勾选「全部重传」时对未改章节也重新提交。
      </p>
      <div id="book-upload-legacy-hint" class="book-upload-legacy-hint" style="display: none" role="status"></div>
      <div class="book-upload-toolbar">
        <label class="book-upload-force-full-label" title="未勾选时仅上传待上传分项，减少服务器冗余">
          <input type="checkbox" id="book-upload-force-full" />
          全部重传（含未改章节）
        </label>
        <button type="button" class="content-compose-mini-btn" id="book-upload-refresh" title="重新读取本地与同步状态">
          <i class="bi bi-arrow-clockwise"></i> 刷新状态
        </button>
        <button type="button" class="apply-editor-btn apply-editor-btn-secondary" id="book-upload-selected">
          上传选中项
        </button>
        <button type="button" class="apply-editor-btn apply-editor-btn-primary" id="book-upload-all">全部上传</button>
      </div>
      <div id="book-upload-remote-line" class="book-upload-remote-line"></div>
      <ul id="book-upload-parts-list" class="book-upload-parts-list" aria-label="上传分项"></ul>
      <p id="book-upload-no-draft" class="book-upload-no-draft" style="display: none">
        请先点击「保存草稿」生成本地目录草稿后再上传。
      </p>
      <div id="book-upload-panel-progress" class="content-compose-upload-progress" style="display: none"></div>
    </div>
  </div>
  <div data-compose-slot="bottom">
    <div class="content-compose-bottom-tools compose-book-bottom-tools" id="content-compose-bottom-tools">
      <div id="content-compose-meta-tools" class="content-compose-meta-tools">
        <div id="content-compose-book-author-meta" class="content-compose-book-author-meta" aria-label="书籍作者与联合作者">
          <div class="content-compose-field" id="content-compose-author-wrap">
            <label for="content-compose-author">书籍作者<span class="content-compose-required-mark" aria-hidden="true"> *</span></label>
            <input
              type="text"
              id="content-compose-author"
              placeholder="请输入作者署名"
              maxlength="120"
              autocomplete="off"
              aria-required="true"
            />
          </div>
          <div class="content-compose-field" id="content-compose-coauthors-wrap">
            <label id="content-compose-coauthors-label">联合作者</label>
            <div id="content-compose-coauthors-list" class="content-compose-coauthors-list" aria-labelledby="content-compose-coauthors-label"></div>
            <div id="content-compose-coauthors-input-row" class="content-compose-coauthors-input-row" style="display: none">
              <input
                type="text"
                id="content-compose-coauthor-input"
                class="content-compose-coauthor-input"
                placeholder="邮箱或公钥（hex / epub1）"
                maxlength="500"
                autocomplete="off"
              />
              <button type="button" class="content-compose-mini-btn" id="content-compose-coauthor-add">添加</button>
              <button type="button" class="content-compose-mini-btn" id="content-compose-coauthor-cancel">取消</button>
            </div>
            <button type="button" class="content-compose-coauthors-show-btn" id="content-compose-coauthor-show">
              <i class="bi bi-person-plus" aria-hidden="true"></i> 添加联合作者
            </button>
          </div>
        </div>
        <div class="content-compose-field">
          <div class="content-compose-label-row">
            <label for="content-compose-tag-input">标签</label>
          </div>
          <div class="content-compose-tags-editor">
            <div class="content-compose-tags-list" id="content-compose-tags-list"></div>
            <div class="content-compose-tags-add-row">
              <input
                type="text"
                id="content-compose-tag-input"
                class="content-compose-tag-input"
                placeholder="输入标签，回车或点击添加"
                maxlength="32"
                autocomplete="off"
              />
              <button type="button" class="content-compose-mini-btn" id="content-compose-tag-add">添加</button>
            </div>
          </div>
          <input type="hidden" id="content-compose-tags" value="" />
        </div>
      </div>
      <div class="book-compose-info-save-row" aria-label="书籍信息页保存草稿">
        <button type="button" class="apply-editor-btn apply-editor-btn-secondary" id="book-compose-info-save-draft">
          <i class="bi bi-save" aria-hidden="true"></i> 保存到草稿箱
        </button>
      </div>
      <div id="content-compose-actions-footer" class="content-compose-actions-footer">
        <div class="content-compose-upload-progress" id="content-compose-upload-progress" style="display:none;"></div>
      </div>
    </div>
  </div>
</div>
